  <path d="M32 13 Q30 9 32 5 Q34 1 32 -2" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M42 14 Q40 10 42 6 Q44 2 42 -1" stroke="#c8a96e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

